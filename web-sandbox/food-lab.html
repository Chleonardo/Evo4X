<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Lab — EvoGame</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #ccc; font-family: sans-serif; font-size: 13px; }

    #header { padding: 10px 16px; background: #1a1a2e; border-bottom: 1px solid #333; }
    #header h1 { font-size: 16px; color: #fff; display: inline; margin-right: 12px; }
    #header a { font-size: 12px; color: #888; text-decoration: none; }
    #header a:hover { color: #ccc; }

    #biome-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 10px 16px; background: #151525; border-bottom: 1px solid #333;
    }
    .biome-btn {
      padding: 4px 10px; border-radius: 4px; border: 2px solid #555;
      background: #1e1e30; color: #aaa; cursor: pointer; font-size: 12px;
    }
    .biome-btn:hover { background: #2a2a40; color: #eee; }
    .biome-btn.active { background: #2a2a40; color: #fff; font-weight: bold; }

    #chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
      padding: 12px 16px;
    }

    .chart-card {
      background: #1a1a2e; border: 1px solid #2a2a44; border-radius: 6px;
      padding: 10px;
    }
    .card-title {
      font-size: 12px; font-weight: bold; color: #ddd;
      margin-bottom: 6px;
    }

    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 6px;
    }
    .legend-item { font-size: 11px; color: #aaa; display: flex; align-items: center; gap: 3px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .pop-table { margin-top: 8px; border-top: 1px solid #2a2a44; padding-top: 6px; }
    .pop-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; padding: 1px 0; color: #999;
    }
    .pop-row b { color: #eee; }
    .cons-badge { color: #555; font-size: 10px; margin-left: 2px; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Food Lab</h1>
    <a href="/">← back to sandbox</a>
    &nbsp;·&nbsp;
    <span style="color:#888">size &amp; consumption v1 · no migration · 80 ticks · resource pool = 200</span>
  </div>
  <div id="biome-bar"></div>
  <div id="chart-grid"></div>
  <script type="module" src="/src/food-lab.ts"></script>
</body>
</html>
